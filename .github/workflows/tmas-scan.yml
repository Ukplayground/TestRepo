name: Security Scan (TMAS)

on:
  push:
    branches: ['**']              # Run on push to ALL branches
  pull_request:
    branches: [main]            # Run before merging a pull request
  schedule:
    - cron: '0 2 * * *'        # Also run daily at 02:00 UTC

jobs:
  tmas-source-scan:
    name: TMAS Source Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run TMAS Source Scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          artifact: dir:.
          vulnerabilitiesScan: true
          secretsScan: true
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          additionalArgs: --region=us-east-1

  tmas-image-scan:
    name: TMAS Container Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t myapp:scan-${{ github.sha }} .

      - name: Run TMAS Image Scan
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          artifact: docker:myapp:scan-${{ github.sha }}
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: true
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          additionalArgs: --region=us-east-1 # set your region
